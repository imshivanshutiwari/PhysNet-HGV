# ─────────────────────────────────────────────────────
# Physics-Informed Neural Network (PINN) Configuration
# ─────────────────────────────────────────────────────

network:
  n_layers: 6
  hidden_dim: 256
  activation: "tanh"
  input_dim: 13       # [t, x,y,z, vx,vy,vz, phi,theta,psi, p,q,r]
  output_dim: 13      # [x,y,z, vx,vy,vz, phi,theta,psi, p,q,r, Ne]
  dropout: 0.0
  weight_init: "xavier_uniform"

physics_loss:
  lambda_data: 1.0
  lambda_momentum: 1.0
  lambda_continuity: 0.5
  lambda_plasma: 0.8

plasma:
  Ne_threshold: 1.0e+18    # electron density blackout threshold [m⁻³]
  ionisation_energy_eV: 15.6  # N₂ first ionisation energy
  species: "N2"

training:
  optimizer: "adamw"
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  epochs: 200
  batch_size: 512
  scheduler: "cosine_annealing"
  scheduler_T_max: 200
  grad_clip_norm: 1.0
  early_stopping_patience: 20

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  normalise: true
  collocation_points: 10000   # interior physics points per batch

logging:
  wandb_project: "physnet-hgv-pinn"
  log_interval: 10
  save_best: true
  checkpoint_dir: "checkpoints/pinn"
