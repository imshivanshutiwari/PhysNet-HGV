hgv:
  altitude_range_km: [30, 80]
  velocity_range_mach: [5, 20]
  bank_angle_range_deg: [-30, 30]
  n_trajectories: 10000
  dt: 0.1
  max_duration_s: 300
  mass_kg: 907
  ref_area_m2: 0.88
  target_range_km: 500
  splits: [0.70, 0.15, 0.15]

pinn:
  n_layers: 6
  hidden_dim: 256
  activation: tanh
  lambda_momentum: 1.0
  lambda_continuity: 0.5
  lambda_plasma: 0.8
  lr: 1e-4
  n_epochs: 200
  batch_size: 64
  optimizer: adamw
  blackout_Ne_threshold: 1e18

ukf:
  alpha: 0.001
  kappa: 0
  beta: 2
  dt: 0.1
  singer_alpha: 0.05
  sigma_m2: 100.0
  fading_factor: 0.98
  initial_P_diag: [100, 100, 100, 10, 10, 10, 1, 1, 1]
  nees_chi2_threshold: 11.07

diffusion:
  T_diffusion: 1000
  beta_start: 1e-4
  beta_end: 0.02
  n_samples: 500
  condition_dim: 18
  hidden_dim: 128
  lr: 2e-4
  n_epochs: 100
  batch_size: 32

sensor:
  radar_range_km: 800
  radar_refresh_hz: 10
  radar_pos_noise_m: 50
  radar_vel_noise_ms: 5
  ir_bearing_noise_deg: 0.1
  optical_resolution_m: 30
  optical_sr_scale: 4
  sensor_dropout_prob: 0.2
